<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProctorGuard — Login</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0b0f1a; --bg2: #111827; --bg3: #1a2236;
    --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.15);
    --text: #f0f4ff; --muted: #8a9bb5;
    --accent: #4f8cff; --accent2: #7c3aed;
    --success: #10b981; --danger: #ef4444;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; }

  .card { width: 420px; background: var(--bg2); border: 1px solid var(--border2); border-radius: 20px; padding: 48px; }

  .logo { width: 60px; height: 60px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 28px; margin: 0 auto 24px; }

  h1 { font-family: 'DM Serif Display', serif; font-size: 28px; text-align: center; margin-bottom: 6px; }
  .subtitle { color: var(--muted); font-size: 14px; text-align: center; margin-bottom: 36px; }

  .field { margin-bottom: 16px; }
  label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  input { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; color: var(--text); font-family: inherit; font-size: 15px; outline: none; transition: border-color 0.15s; }
  input:focus { border-color: var(--accent); }

  .btn { width: 100%; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; border: none; border-radius: 10px; padding: 14px; font-family: inherit; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px; transition: opacity 0.2s; }
  .btn:hover { opacity: 0.9; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); border-radius: 8px; padding: 10px 14px; font-size: 13px; color: var(--danger); margin-bottom: 16px; display: none; }

  .roles { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-top: 24px; }
  .role-badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; background: var(--bg3); border: 1px solid var(--border); color: var(--muted); }

  .default-creds { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; font-size: 12px; color: var(--muted); margin-top: 16px; text-align: center; }
  .default-creds strong { color: var(--text); }
</style>
</head>
<body>
<div class="card">
  <div class="logo">🎓</div>
  <h1>ProctorGuard</h1>
  <p class="subtitle">Online Examination Platform — Sign in to continue</p>

  <div class="error" id="error-msg"></div>

  <div class="field">
    <label>Email Address</label>
    <input type="email" id="email" placeholder="your@email.com" autocomplete="email" />
  </div>

  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
  </div>

  <button class="btn" id="login-btn" onclick="login()">Sign In →</button>

  <div class="roles">
    <span class="role-badge">👨‍💼 Admin</span>
    <span class="role-badge">👨‍🏫 Faculty</span>
    <span class="role-badge">🔍 Moderator</span>
    <span class="role-badge">🛡 Proctor</span>
    <span class="role-badge">🎓 Student</span>
  </div>

  <div class="default-creds">
    <strong></strong> / <strong></strong>
  </div>
</div>

<script>
const ROLE_ROUTES = {
  admin:     '/admin',
  faculty:   '/faculty',
  moderator: '/moderator',
  proctor:   '/proctor',
  student:   '/student'
};

// If already logged in redirect
const stored = localStorage.getItem('pg_token');
if (stored) {
  try {
    const u = JSON.parse(atob(stored.split('.')[1]));
    if (u.exp * 1000 > Date.now()) {
      const roles = u.roles || [u.role];
      let dest = '/';
      if (roles.includes('admin')) dest = '/admin';
      else if (roles.includes('student')) dest = '/student';
      else if (roles.length === 1 && roles[0] === 'proctor') dest = '/proctor';
      else if (roles.some(r => ['faculty','moderator','proctor'].includes(r))) dest = '/portal';
      window.location.href = dest;
    }
  } catch {}
}

document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') login();
});

async function login() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('login-btn');
  const errEl    = document.getElementById('error-msg');

  errEl.style.display = 'none';
  if (!email || !password) {
    errEl.textContent = 'Please enter email and password.';
    errEl.style.display = 'block'; return;
  }

  btn.disabled = true;
  btn.textContent = 'Signing in…';

  try {
    const res  = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!res.ok) {
      errEl.textContent = data.error || 'Login failed.';
      errEl.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Sign In →'; return;
    }
    localStorage.setItem('pg_token', data.token);
    localStorage.setItem('pg_user', JSON.stringify(data.user));
    if (data.user.must_change_password) {
      window.location.href = '/change-password.html'; return;
    }
    const roles = data.user.roles || [data.user.role];
    let dest = '/';
    if (roles.includes('admin')) dest = '/admin';
    else if (roles.includes('student')) dest = '/student';
    else if (roles.length === 1 && roles[0] === 'proctor') dest = '/proctor';
    else if (roles.some(r => ['faculty','moderator','proctor'].includes(r))) dest = '/portal';
    window.location.href = dest;
  } catch (e) {
    errEl.textContent = 'Server error. Please try again.';
    errEl.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Sign In →';
  }
}
</script>
</body>
</html>
